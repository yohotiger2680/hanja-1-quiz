<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>한자 1급 암기첩</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700&family=Jua&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; }

body {
  min-height: 100vh;
  background:
    url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27280%27%20height%3D%27280%27%20viewBox%3D%270%200%20280%20280%27%3E%3Cg%20fill%3D%27none%27%20stroke%3D%27%23ffffff%27%20stroke-width%3D%272.2%27%20opacity%3D%270.6%27%20stroke-linejoin%3D%27round%27%20stroke-linecap%3D%27round%27%3E%3Cpath%20d%3D%27M42%2028%20l6%2014%2015%202%20-11%2010%203%2015%20-13%20-8%20-13%208%203%20-15%20-11%20-10%2015%20-2%20z%27%2F%3E%3Cpath%20d%3D%27M205%2058%20l4%2010%2010%204%20-10%204%20-4%2010%20-4%20-10%20-10%20-4%2010%20-4%20z%27%2F%3E%3Ccircle%20cx%3D%27150%27%20cy%3D%2736%27%20r%3D%274%27%2F%3E%3Ccircle%20cx%3D%27238%27%20cy%3D%27150%27%20r%3D%276%27%2F%3E%3Cpath%20d%3D%27M66%20182%20l5%2012%2013%201%20-10%209%203%2013%20-11%20-7%20-11%207%203%20-13%20-10%20-9%2013%20-1%20z%27%2F%3E%3Cpath%20d%3D%27M182%20214%20l3%208%208%203%20-8%203%20-3%208%20-3%20-8%20-8%20-3%208%20-3%20z%27%2F%3E%3Ccircle%20cx%3D%2728%27%20cy%3D%27120%27%20r%3D%273%27%2F%3E%3Cpath%20d%3D%27M126%20120%20l2.5%206%206%202.5%20-6%202.5%20-2.5%206%20-2.5%20-6%20-6%20-2.5%206%20-2.5%20z%27%2F%3E%3Ccircle%20cx%3D%2796%27%20cy%3D%27250%27%20r%3D%274%27%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E") repeat,
    radial-gradient(1100px 480px at 50% -10%, #f2fbe9 0%, rgba(242,251,233,0) 60%),
    linear-gradient(180deg, #ddf1e6 0%, #d2ecdf 100%);
  color: #33452b;
  font-family: 'Gothic A1', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 20px 16px;
}

.top {
  width: 100%; max-width: 720px;
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 16px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 12px; }
.seal {
  width: 44px; height: 44px;
  background: #6FA83C; color: #ffffff;
  font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 24px;
  display: grid; place-items: center;
  border-radius: 46% 54% 52% 48% / 52% 46% 54% 48%;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.55);
}
h1 { font-family: 'Jua', sans-serif; font-size: 21px; font-weight: 400; letter-spacing: -0.01em; }
.sub { font-size: 12px; color: #7f9678; margin-top: 2px; }

.legend { display: flex; gap: 10px; font-size: 12px; color: #5f7a55; align-items: center; }
.legend span, .lgbtn { display: inline-flex; align-items: center; gap: 5px; }
.lgbtn {
  font-family: inherit; font-size: 12px; color: #5f7a55;
  background: transparent; border: 1px dashed #bfdfa0; border-radius: 999px;
  padding: 4px 10px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  transition: border-color .15s, transform .1s;
}
.lgbtn:hover { border-color: #6FA83C; }
.lgbtn:focus-visible { outline: 2px solid #6FA83C; outline-offset: 2px; }
.lgbtn.pulse { animation: lgpulse .35s ease; }
@keyframes lgpulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.18); border-color: #6FA83C; }
  100% { transform: scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  .lgbtn.pulse { animation: none; }
}
.sw { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
.sw.yl { background: #ffe23d; }
.sw.gr { background: #00B050; }
.sw.bl { background: #00B0F0; }

.bar {
  width: 100%; max-width: 720px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
  margin-top: 22px;
}
.chips, .ordctl { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 6px 13px;
  border: 1px solid #bfdfa0; border-radius: 999px;
  background: #ffffff; color: #4c6440;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.chip:hover { border-color: #6FA83C; }
.chip.on { background: #7fb84e; border-color: #7fb84e; color: #ffffff; }
.chip:focus-visible, .card:focus-visible, .star:focus-visible { outline: 2px solid #6FA83C; outline-offset: 2px; }

.stage {
  flex: 1;
  width: 100%; max-width: 720px;
  display: flex; flex-direction: column; align-items: center;
  margin-top: 26px;
}

.card {
  position: relative;
  width: min(440px, 100%);
  min-height: 280px;
  background: #ffffff;
  border: 1px solid #c9e6a8;
  border-radius: 18px;
  box-shadow: 0 14px 30px rgba(84,140,80,.16), 0 2px 6px rgba(84,140,80,.09);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  padding: 28px;
  cursor: grab;
  touch-action: pan-y;
  -webkit-user-select: none; user-select: none;
  will-change: transform;
}
.card:active { cursor: grabbing; }
.star {
  position: absolute;
  top: 14px; right: 14px; z-index: 2;
  width: 42px; height: 42px;
  border: none; border-radius: 50%;
  background: transparent;
  font-size: 24px; line-height: 1;
  color: #b7d5a5;
  cursor: pointer;
  transition: color .15s, transform .1s;
}
.star:hover { color: #6FA83C; }
.star:active { transform: scale(.9); }
.star.on { color: #6FA83C; }

.glyph {
  font-family: 'Noto Serif KR', serif;
  font-weight: 700;
  font-size: 132px;
  line-height: 1.15;
  padding: 0 14px;
  border-radius: 8px;
}
.glyph.hl {
  background: linear-gradient(104deg, rgba(255,226,61,0) 3%, rgba(255,226,61,.85) 5%, rgba(255,226,61,.85) 95%, rgba(255,226,61,0) 97%);
}
.glyph.gr { color: #00B050; }
.glyph.bl { color: #00B0F0; }

.hint { font-size: 12px; color: #93b28c; }

.answer {
  width: min(440px, 100%);
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-6px);
  transition: max-height .3s ease, opacity .25s ease, transform .25s ease;
}
.answer.open {
  max-height: 240px;
  opacity: 1;
  transform: translateY(0);
}
@media (prefers-reduced-motion: reduce) {
  .answer { transition: none; }
}
.ansbox {
  margin-top: 12px;
  background: #ffffff;
  border: 1px solid #c9e6a8;
  border-left: 4px solid #6FA83C;
  border-radius: 14px;
  padding: 20px 22px 16px;
  display: flex; flex-direction: column; align-items: center;
  gap: 7px;
}
.reading { font-family: 'Jua', sans-serif; font-size: 28px; font-weight: 400; text-align: center; letter-spacing: 0; word-break: keep-all; }
.freq { font-family: 'Jua', sans-serif; font-size: 15px; color: #6FA83C; font-weight: 400; }
.srcs { font-family: 'Jua', sans-serif; font-size: 12px; color: #93b28c; text-align: center; }

.nav { display: flex; align-items: center; justify-content: center; margin-top: 20px; width: min(440px, 100%); }
.count { font-size: 15px; font-weight: 500; min-width: 110px; text-align: center; }
.count em { font-style: normal; color: #a3bd9c; padding: 0 3px; }

.empty { color: #7f9678; font-size: 14px; margin-top: 60px; display: none; text-align: center; padding: 0 16px; word-break: keep-all; }

.foot { margin-top: 26px; font-size: 11px; color: #a3bd9c; }

@media (max-width: 480px) {
  .card { min-height: 240px; }
  .glyph { font-size: 104px; }
}
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="seal">급</span>
    <div>
      <h1>한자 1급 암기첩</h1>
      <p class="sub" id="sub"></p>
    </div>
  </div>
  <div class="legend">
    <button class="lgbtn" id="legendYl" title="더블클릭하면 지금 보는 한자에 형광펜"><i class="sw yl"></i>암기함</button>
    <button class="lgbtn" id="legendGr" title="더블클릭하면 지금 보는 한자를 식물로 표시"><i class="sw gr"></i>식물</button>
    <button class="lgbtn" id="legendBl" title="더블클릭하면 지금 보는 한자를 동물로 표시"><i class="sw bl"></i>동물</button>
  </div>
</header>

<div class="bar">
  <div class="chips" id="filters">
    <button class="chip on" data-f="all">전체</button>
    <button class="chip" data-f="todo">미암기</button>
    <button class="chip" data-f="star">★ 별표</button>
  </div>
  <div class="ordctl">
    <button class="chip on" id="btnOrig">빈도순</button>
    <button class="chip" id="btnShuf">섞기</button>
  </div>
</div>

<main class="stage">
  <div class="card" id="card" role="button" tabindex="0" aria-expanded="false" aria-label="훈음 확인">
    <button class="star" id="star" aria-label="별표 추가" aria-pressed="false">☆</button>
    <span class="glyph" id="glyph"></span>
    <span class="hint" id="hint">카드를 눌러 훈음 확인</span>
  </div>

  <div class="answer" id="answer" aria-hidden="true">
    <div class="ansbox">
      <p class="reading" id="reading"></p>
      <p class="freq" id="freq"></p>
      <p class="srcs" id="srcs"></p>
    </div>
  </div>

  <div class="nav" id="navRow">
    <span class="count"><span id="posNow">1</span> <em>/</em> <span id="posTotal">1</span></span>
  </div>

  <p class="empty" id="empty"></p>
</main>

<footer class="foot">출처: 한자1급_훈음정리_빈도순_모르는_것만정리.xlsx</footer>

<script src="data.js"></script>
<script>
// DATA row: [한자, 훈음, 총등장횟수, 출처인덱스, flags]
// flags: +4 = 암기함(노란 형광펜), %4 → 0 일반 · 1 식물(초록) · 2 동물(파랑)
var STORE_KEY = "hanja1-starred";
var CAT_KEY = "hanja1-catover";
var MEM_KEY = "hanja1-memover";

var filter = "all";
var order = null;      // null = 빈도순
var pos = 0;
var open = false;
var starred = new Set();
var catOver = {};      // {한자: 0(일반)|1(식물)|2(동물)} — 사용자가 앱에서 지정한 분류
var memOver = {};      // {한자: true|false} — 앱에서 칠하거나 지운 형광펜

try {
  var saved = localStorage.getItem(STORE_KEY);
  if (saved) starred = new Set(JSON.parse(saved));
} catch (e) {}
try {
  var savedCat = localStorage.getItem(CAT_KEY);
  if (savedCat) catOver = JSON.parse(savedCat) || {};
} catch (e) {}
try {
  var savedMem = localStorage.getItem(MEM_KEY);
  if (savedMem) memOver = JSON.parse(savedMem) || {};
} catch (e) {}

function saveStars() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(Array.from(starred))); } catch (e) {}
}
function saveCats() {
  try { localStorage.setItem(CAT_KEY, JSON.stringify(catOver)); } catch (e) {}
}
function saveMems() {
  try { localStorage.setItem(MEM_KEY, JSON.stringify(memOver)); } catch (e) {}
}

function effCat(row) {
  var o = catOver[row[0]];
  if (o === 0 || o === 1 || o === 2) return o;
  return row[4] % 4;
}
function effMem(row) {
  var o = memOver[row[0]];
  if (typeof o === "boolean") return o;
  return row[4] >= 4;
}

function matches(row) {
  if (filter === "todo") return !effMem(row);
  if (filter === "star") return starred.has(row[0]);
  return true;
}

function currentIndices() {
  var src = order || DATA.map(function (_, i) { return i; });
  var out = [];
  for (var k = 0; k < src.length; k++) {
    if (matches(DATA[src[k]])) out.push(src[k]);
  }
  return out;
}

function shuffle() {
  var a = DATA.map(function (_, i) { return i; });
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

var $ = function (id) { return document.getElementById(id); };

function render() {
  var idx = currentIndices();
  var total = idx.length;
  var hasCard = total > 0;

  $("sub").textContent = "빈도순 훈음 카드 · " + DATA.length.toLocaleString() + "자" +
    (starred.size > 0 ? " · 별표 " + starred.size + "자" : "");

  $("card").style.display = hasCard ? "flex" : "none";
  $("answer").style.display = hasCard ? "" : "none";
  $("navRow").style.display = hasCard ? "flex" : "none";
  $("empty").style.display = hasCard ? "none" : "block";

  if (!hasCard) {
    $("empty").textContent = filter === "star"
      ? "별표한 한자가 아직 없음. 카드 오른쪽 위 ☆ 버튼이나 S 키로 모을 수 있음."
      : "이 조건에 해당하는 한자가 없음. 다른 필터를 선택해 보기.";
    return;
  }

  if (pos > total - 1) pos = total - 1;
  var row = DATA[idx[pos]];
  var mem = effMem(row);
  var cat = effCat(row);

  var g = $("glyph");
  g.textContent = row[0];
  g.className = "glyph" + (mem ? " hl" : "") + (cat === 1 ? " gr" : cat === 2 ? " bl" : "");

  var isStar = starred.has(row[0]);
  var s = $("star");
  s.textContent = isStar ? "★" : "☆";
  s.className = "star" + (isStar ? " on" : "");
  s.setAttribute("aria-pressed", isStar);
  s.setAttribute("aria-label", isStar ? "별표 해제" : "별표 추가");

  $("reading").textContent = row[1];
  $("freq").textContent = "총 " + row[2] + "회 등장";
  $("srcs").textContent = SRC[row[3]];

  $("answer").className = "answer" + (open ? " open" : "");
  $("answer").setAttribute("aria-hidden", !open);
  $("card").setAttribute("aria-expanded", open);
  $("hint").textContent = open ? "카드를 누르면 닫힘 · 밀어서 다음" : "카드를 눌러 훈음 확인 · 밀어서 다음";

  $("posNow").textContent = pos + 1;
  $("posTotal").textContent = total;
}

function go(d) {
  var total = currentIndices().length;
  if (!total) return;
  open = false;
  pos = (pos + d + total) % total;
  render();
}

function toggleStar() {
  var idx = currentIndices();
  if (!idx.length) return;
  var h = DATA[idx[Math.min(pos, idx.length - 1)]][0];
  if (starred.has(h)) starred.delete(h);
  else starred.add(h);
  saveStars();
  render();
}

function setCategory(target) { // target: 1 식물, 2 동물
  var idx = currentIndices();
  if (!idx.length) return;
  var row = DATA[idx[Math.min(pos, idx.length - 1)]];
  var h = row[0];
  var base = row[4] % 4;
  var now = effCat(row);
  if (now === target) {
    // 이미 그 분류면 더블클릭으로 해제
    if (base === target) catOver[h] = 0;
    else delete catOver[h];
  } else {
    if (base === target) delete catOver[h];
    else catOver[h] = target;
  }
  saveCats();
  var btn = target === 1 ? $("legendGr") : $("legendBl");
  btn.classList.remove("pulse");
  void btn.offsetWidth; // 애니메이션 재시작
  btn.classList.add("pulse");
  render();
}

function bindDouble(el, fn) {
  var fired = 0;
  function run() {
    var t = Date.now();
    if (t - fired < 400) return; // dblclick·더블탭 중복 방지
    fired = t;
    fn();
  }
  el.addEventListener("dblclick", function (e) { e.preventDefault(); run(); });
  var last = 0;
  el.addEventListener("touchend", function (e) {
    var now = Date.now();
    if (now - last < 320) { e.preventDefault(); run(); }
    last = now;
  });
}
function setMemorized() {
  var idx = currentIndices();
  if (!idx.length) return;
  var row = DATA[idx[Math.min(pos, idx.length - 1)]];
  var h = row[0];
  var base = row[4] >= 4;
  var next = !effMem(row);
  if (next === base) delete memOver[h];
  else memOver[h] = next;
  saveMems();
  var btn = $("legendYl");
  btn.classList.remove("pulse");
  void btn.offsetWidth;
  btn.classList.add("pulse");
  render();
}

bindDouble($("legendYl"), setMemorized);
bindDouble($("legendGr"), function () { setCategory(1); });
bindDouble($("legendBl"), function () { setCategory(2); });

// 카드를 손가락/마우스로 끌어서 넘기기
var suppressClick = false;
(function () {
  var card = $("card");
  var RM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var dragging = false, horiz = null, startX = 0, startY = 0, dx = 0;

  function settle() {
    card.style.transition = RM ? "none" : "transform .25s ease";
    card.style.transform = "translateX(0) rotate(0deg)";
  }

  card.addEventListener("pointerdown", function (e) {
    if (e.button !== undefined && e.button !== 0) return;
    dragging = true; horiz = null; dx = 0;
    startX = e.clientX; startY = e.clientY;
    try { card.setPointerCapture(e.pointerId); } catch (err) {}
    card.style.transition = "none";
  });

  card.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    var mx = e.clientX - startX;
    var my = e.clientY - startY;
    if (horiz === null && (Math.abs(mx) > 8 || Math.abs(my) > 8)) {
      horiz = Math.abs(mx) > Math.abs(my);
    }
    if (horiz) {
      dx = mx;
      card.style.transform = "translateX(" + dx + "px) rotate(" + dx * 0.02 + "deg)";
    }
  });

  function finish() {
    if (!dragging) return;
    dragging = false;
    var w = card.offsetWidth || 440;
    var threshold = Math.max(90, w * 0.3);
    if (horiz && Math.abs(dx) > threshold) {
      suppressClick = true;
      var dir = dx < 0 ? 1 : -1;
      if (RM) {
        card.style.transition = "none";
        card.style.transform = "translateX(0) rotate(0deg)";
        go(dir);
      } else {
        var out = dir === 1 ? -(w + 100) : (w + 100);
        card.style.transition = "transform .18s ease";
        card.style.transform = "translateX(" + out + "px) rotate(" + dx * 0.03 + "deg)";
        setTimeout(function () {
          go(dir);
          card.style.transition = "none";
          card.style.transform = "translateX(" + (dir === 1 ? (w + 100) : -(w + 100)) + "px)";
          void card.offsetWidth;
          settle();
        }, 180);
      }
    } else {
      if (horiz && Math.abs(dx) > 8) suppressClick = true;
      settle();
    }
    setTimeout(function () { suppressClick = false; }, 120);
  }

  card.addEventListener("pointerup", finish);
  card.addEventListener("pointercancel", function () { dragging = false; settle(); });
})();

$("card").addEventListener("click", function () {
  if (suppressClick) return; // 드래그 직후의 클릭은 무시
  open = !open; render();
});
$("card").addEventListener("keydown", function (e) {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault(); e.stopPropagation();
    open = !open; render();
  }
});
$("star").addEventListener("click", function (e) { e.stopPropagation(); toggleStar(); });

document.querySelectorAll("#filters .chip").forEach(function (b) {
  b.addEventListener("click", function () {
    filter = b.dataset.f;
    pos = 0; open = false;
    document.querySelectorAll("#filters .chip").forEach(function (x) { x.classList.toggle("on", x === b); });
    render();
  });
});
$("btnOrig").addEventListener("click", function () {
  order = null; pos = 0; open = false;
  $("btnOrig").classList.add("on"); $("btnShuf").classList.remove("on");
  render();
});
$("btnShuf").addEventListener("click", function () {
  order = shuffle(); pos = 0; open = false;
  $("btnShuf").classList.add("on"); $("btnOrig").classList.remove("on");
  render();
});

window.addEventListener("keydown", function (e) {
  if (e.target !== document.body && e.target !== $("card")) return;
  if (e.key === "ArrowRight") go(1);
  else if (e.key === "ArrowLeft") go(-1);
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); open = !open; render(); }
  else if (e.key === "s" || e.key === "S") toggleStar();
});

render();
</script>
</body>
</html>
