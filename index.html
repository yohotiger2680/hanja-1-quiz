<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>한자 1급 암기첩</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700&family=Jua&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet" />
<style>

html, body { overscroll-behavior: none; }

    radial-gradient(1100px 480px at 50% -10%, #f2fbe9 0%, rgba(242,251,233,0) 60%),
    linear-gradient(180deg, #ddf1e6 0%, #d2ecdf 100%);
  color: #33452b;
  font-family: 'Gothic A1', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 20px 24px;
  touch-action: pan-y;
}

.top {
  width: 100%; max-width: 720px;
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 16px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 12px; }
.seal {
  width: 44px; height: 44px;
  background: #6FA83C; color: #ffffff;
  font-family: 'Jua', sans-serif; font-size: 24px;
  display: grid; place-items: center;
  border-radius: 46% 54% 52% 48% / 52% 46% 54% 48%;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.55);
}
h1 { font-family: 'Jua', sans-serif; font-size: 21px; font-weight: 400; letter-spacing: -0.01em; }
.sub { font-size: 12px; color: #7f9678; margin-top: 2px; }

.legend { display: flex; gap: 10px; font-size: 12px; color: #5f7a55; align-items: center; }
.lgbtn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: inherit; font-size: 12px; color: #5f7a55;
  background: transparent; border: 1px dashed #bfdfa0; border-radius: 999px;
  padding: 4px 10px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  transition: border-color .15s, transform .1s;
}
.lgbtn:hover { border-color: #6FA83C; }
.lgbtn.pulse { animation: lgpulse .35s ease; }
@keyframes lgpulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.18); border-color: #6FA83C; }
  100% { transform: scale(1); }
}
@media (prefers-reduced-motion: reduce) { .lgbtn.pulse { animation: none; } }
.sw { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
.sw.yl { background: #ffe23d; }
.sw.gr { background: #00B050; }
.sw.bl { background: #00B0F0; }
body[data-tab="words"] .catonly, body[data-tab="idioms"] .catonly {
  opacity: .3;
  pointer-events: none;
}

/* 1단계: 콘텐츠 대분류 (한자/단어/사자성어) — 세그먼트 바 */
.tabs {
  width: 100%; max-width: 720px;
  display: flex; gap: 4px;
  background: rgba(255,255,255,.78);
  border: 1px solid #c9e6a8;
  border-radius: 999px;
  padding: 4px;
  margin-top: 20px;
  box-shadow: 0 2px 8px rgba(84,140,80,.08);
}
.tab {
  flex: 1;
  font-family: 'Jua', sans-serif;
  font-size: 16px;
  padding: 9px 0;
  border: none; border-radius: 999px;
  background: transparent; color: #4c6440;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.tab:hover:not(.on) { background: #f1f8e6; }
.tab.on {
  background: #7fb84e; color: #ffffff;
  box-shadow: 0 2px 6px rgba(84,140,80,.28);
}

/* 2단계: 현재 탭 안의 필터·순서 — 작은 보조 칩 */
.bar {
  width: 100%; max-width: 720px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
  margin-top: 12px;
  padding: 0 6px;
}
.chips, .ordctl { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.ordctl { border-left: 1px dashed #c9e6a8; padding-left: 10px; }
.chip {
  font-family: inherit; font-size: 12px; font-weight: 500;
  padding: 5px 11px;
  border: 1px solid transparent; border-radius: 999px;
  background: transparent; color: #7f9678;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.chip:hover { color: #4c6440; }
.chip.on {
  background: #eaf6db; color: #3f6e1f;
  border-color: #cbe6ac; font-weight: 700;
}
.chip:focus-visible, .tab:focus-visible, .card:focus-visible, .star:focus-visible, .lgbtn:focus-visible { outline: 2px solid #6FA83C; outline-offset: 2px; }

.stage {
  flex: 1;
  width: 100%; max-width: 720px;
  display: flex; flex-direction: column; align-items: center;
  margin-top: 20px;
}

.card {
  position: relative;
  width: min(460px, 100%);
  min-height: 250px;
  background: #ffffff;
  border: 1px solid #c9e6a8;
  border-radius: 18px;
  box-shadow: 0 14px 30px rgba(84,140,80,.16), 0 2px 6px rgba(84,140,80,.09);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  padding: 26px;
  cursor: grab;
  touch-action: pan-y;
  -webkit-user-select: none; user-select: none;
  will-change: transform;
}
.card:active { cursor: grabbing; }
.star {
  position: absolute;
  top: 14px; right: 14px; z-index: 2;
  width: 42px; height: 42px;
  border: none; border-radius: 50%;
  background: transparent;
  font-size: 24px; line-height: 1;
  color: #b7d5a5;
  cursor: pointer;
  transition: color .15s, transform .1s;
}
.star:hover { color: #6FA83C; }
.star:active { transform: scale(.9); }
.star.on { color: #6FA83C; }

.glyph {
  font-family: 'Noto Serif KR', serif;
  font-weight: 700;
  line-height: 1.2;
  text-align: center;
  word-break: keep-all;
  border-radius: 8px;
}
.glyph.char { font-size: 120px; padding: 0 14px; }
.glyph.word { font-size: 58px; letter-spacing: 0.04em; padding: 2px 10px; }
.glyph.idiom { font-size: 44px; letter-spacing: 0.03em; padding: 2px 10px; }
.glyph.hl {
  background: linear-gradient(104deg, rgba(255,226,61,0) 3%, rgba(255,226,61,.85) 5%, rgba(255,226,61,.85) 95%, rgba(255,226,61,0) 97%);
}
.glyph.gr { color: #00B050; }
.glyph.bl { color: #00B0F0; }
.glyph.std { text-decoration: underline; text-decoration-color: #6FA83C; text-decoration-thickness: 3px; text-underline-offset: 8px; }
.incount { font-size: 13px; color: #93b28c; }
.incount em { font-style: normal; color: #b7d5a5; padding: 0 2px; }

.answer {
  width: min(460px, 100%);
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-6px);
  transition: max-height .3s ease, opacity .25s ease, transform .25s ease;
}
.answer.open { max-height: 1200px; opacity: 1; transform: translateY(0); }
@media (prefers-reduced-motion: reduce) { .answer { transition: none; } }
.ansbox {
  margin-top: 12px;
  background: #ffffff;
  border: 1px solid #c9e6a8;
  border-left: 4px solid #6FA83C;
  border-radius: 14px;
  padding: 18px 20px 16px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  max-height: 460px;
  overflow-y: auto;
}
.relbox {
  margin-top: 10px;
  background: #ffffff;
  border: 1px solid #c9e6a8;
  border-left: 4px solid #b7d5a5;
  border-radius: 14px;
  padding: 16px 18px 14px;
  display: flex; flex-direction: column;
  gap: 10px;
  max-height: 380px;
  overflow-y: auto;
}
.relbox h3 {
  font-family: 'Jua', sans-serif;
  font-size: 14px; font-weight: 400;
  color: #6FA83C;
  text-align: center;
}
.relitem { border-top: 1px dashed #dceccb; padding-top: 9px; }
.relitem:first-of-type { border-top: none; padding-top: 0; }
.relword { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 19px; }
.relword b { color: #6FA83C; font-weight: 700; }
.relread { font-family: 'Jua', sans-serif; font-size: 14px; color: #7f9678; margin-left: 5px; }
.relmean { font-size: 12.5px; color: #4c6440; margin-top: 2px; line-height: 1.5; word-break: keep-all; }

.reading { font-family: 'Jua', sans-serif; font-size: 28px; font-weight: 400; text-align: center; letter-spacing: 0; word-break: keep-all; }
.meaning { font-size: 14.5px; text-align: center; word-break: keep-all; line-height: 1.55; }
.freq { font-family: 'Jua', sans-serif; font-size: 15px; color: #6FA83C; }

/* 사자성어: 글자별 훈음 */
.hungrid {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 6px;
  width: 100%;
}
.huncell {
  border: 1px solid #dceccb;
  border-radius: 10px;
  padding: 6px 8px 5px;
  min-width: 66px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.huncell.blank { background: #f4fae9; border-color: #bfdfa0; }
.huncell .hc { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 24px; line-height: 1.2; }
.huncell .hh { font-size: 10.5px; color: #5f7a55; text-align: center; word-break: keep-all; }
.blanknote { font-size: 10.5px; color: #93b28c; }

/* 관계 표기 (반의어·새김·발음주의) */
.tagrow { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.tag {
  font-family: 'Jua', sans-serif;
  font-size: 12.5px;
  border-radius: 999px;
  padding: 4px 12px;
}
.tag.ant { background: #eaf6db; color: #4f7b28; }
.tag.form { background: #DDEBF7; color: #2f5573; }
.tag.read { background: #fdeeda; color: #9a6a1e; }
.relsec {
  width: 100%;
  border-top: 1px dashed #dceccb;
  padding-top: 9px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.antrow { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
.antword { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 30px; }
.antread { font-family: 'Jua', sans-serif; font-size: 14px; color: #7f9678; display: block; text-align: center; }
.arrow { font-family: 'Jua', sans-serif; font-size: 26px; color: #6FA83C; line-height: 1; }
.rb-hun { font-family: 'Jua', sans-serif; font-size: 17px; }
.rb-words { font-size: 13px; text-align: center; word-break: keep-all; line-height: 1.6; color: #4c6440; }

.empty { color: #7f9678; font-size: 14px; margin-top: 60px; display: none; text-align: center; padding: 0 16px; word-break: keep-all; }

/* 첫 방문 안내 */
.toast {
  position: fixed;
  left: 50%; bottom: 26px;
  transform: translateX(-50%);
  background: #33452b;
  color: #ffffff;
  font-family: 'Jua', sans-serif;
  font-size: 14px;
  padding: 11px 20px;
  border-radius: 999px;
  box-shadow: 0 8px 22px rgba(40,60,30,.25);
  z-index: 10;
  display: none;
  cursor: pointer;
  text-align: center;
  max-width: 90vw;
}

@media (max-width: 480px) {
  .glyph.char { font-size: 96px; }
  .glyph.word { font-size: 44px; }
  .glyph.idiom { font-size: 32px; }
  .antword { font-size: 24px; }
}
</style>
</head>
<body data-tab="hanja">

<header class="top">
  <div class="brand">
    <span class="seal">급</span>
    <div>
      <h1>한자 1급 암기첩</h1>
      <p class="sub" id="sub"></p>
    </div>
  </div>
  <div class="legend">
    <button class="lgbtn" id="legendYl" title="더블클릭하면 지금 보는 카드에 형광펜"><i class="sw yl"></i>암기함</button>
    <button class="lgbtn catonly" id="legendGr" title="더블클릭하면 지금 보는 한자를 식물로 표시"><i class="sw gr"></i>식물</button>
    <button class="lgbtn catonly" id="legendBl" title="더블클릭하면 지금 보는 한자를 동물로 표시"><i class="sw bl"></i>동물</button>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab on" data-t="hanja">한자</button>
  <button class="tab" data-t="words">단어</button>
  <button class="tab" data-t="idioms">사자성어</button>
</div>

<div class="bar">
  <div class="chips" id="filters">

    <button class="chip" data-f="todo">미암기</button>
    <button class="chip" data-f="done">암기함</button>
    <button class="chip" data-f="star">★ 별표</button>
  </div>
  <div class="ordctl">
    <button class="chip on" id="btnOrig">순서대로</button>
    <button class="chip" id="btnShuf">섞기</button>
  </div>
</div>

<main class="stage">
  <div class="card" id="card" role="button" tabindex="0" aria-expanded="false" aria-label="답 확인">
    <button class="star" id="star" aria-label="별표 추가" aria-pressed="false">☆</button>
    <div id="front"></div>
    <span class="incount"><span id="posNow">1</span> <em>/</em> <span id="posTotal">1</span></span>
  </div>

  <div class="answer" id="answer" aria-hidden="true">
    <div class="ansbox" id="ansbox"></div>
    <div class="relbox" id="relbox" style="display:none"></div>
  </div>

  <p class="empty" id="empty"></p>
</main>

<div class="toast" id="toast">카드를 누르면 답이 열리고, 좌우로 밀면 다음 카드예요</div>

var starred = new Set();  // 한자는 글자 그대로(기존 저장 호환), 단어 "w|", 성어 "i|"
var catOver = {};
var memOver = {};

try { var s0 = localStorage.getItem(STORE_KEY); if (s0) starred = new Set(JSON.parse(s0)); } catch (e) {}
try { var s1 = localStorage.getItem(CAT_KEY); if (s1) catOver = JSON.parse(s1) || {}; } catch (e) {}
try { var s2 = localStorage.getItem(MEM_KEY); if (s2) memOver = JSON.parse(s2) || {}; } catch (e) {}
// 배포용 1회 초기화: 이전에 수동으로 칠한 암기 형광펜을 한 번만 비운다 (색상/별표는 유지)
try {
  if (!localStorage.getItem("hanja1-memreset1")) {
    memOver = {};
    localStorage.removeItem(MEM_KEY);
    localStorage.setItem("hanja1-memreset1", "1");
  }
} catch (e) {}
function saveStars() { try { localStorage.setItem(STORE_KEY, JSON.stringify(Array.from(starred))); } catch (e) {} }
function saveCats() { try { localStorage.setItem(CAT_KEY, JSON.stringify(catOver)); } catch (e) {} }
function saveMems() { try { localStorage.setItem(MEM_KEY, JSON.stringify(memOver)); } catch (e) {} }

// ---------- 관계 사전 (로드 시 1회 구성) ----------
function stripParens(s) { return s.replace(/[()]/g, ""); }

var charWords = {};   // 한자 → [단어 인덱스]
for (var wi = 0; wi < WORDS.length; wi++) {
  var wtxt = WORDS[wi][0];
  for (var ci = 0; ci < wtxt.length; ci++) {
    (charWords[wtxt[ci]] = charWords[wtxt[ci]] || []).push(wi);
  }
}
var charIdioms = {};  // 한자 → [성어 인덱스]
for (var ii = 0; ii < IDIOMS.length; ii++) {
  var itxt = stripParens(IDIOMS[ii][0]);
  var seen = {};
  for (var cj = 0; cj < itxt.length; cj++) {
    var ch = itxt[cj];
    if (seen[ch]) continue;
    seen[ch] = 1;
    (charIdioms[ch] = charIdioms[ch] || []).push(ii);
  }
}
var wordAnts = {};    // 단어 → [반대말, 독음]
for (var ai = 0; ai < ANTS.length; ai++) {
  var a = ANTS[ai];
  wordAnts[a[0]] = [a[2], a[3]];
  wordAnts[a[2]] = [a[0], a[1]];
}
var wordForms = {};   // 단어 → [새김 방식, 풀이]
for (var fi = 0; fi < FORMS.length; fi++) {
  wordForms[FORMS[fi][1]] = [FORMS[fi][0], FORMS[fi][3]];
}
var charReads = {};   // 한자 → [[훈음, 단어들]]
for (var ri = 0; ri < READS.length; ri++) {
  charReads[READS[ri][0]] = READS[ri][1];
}
// 성어에도 괄호 글자 표시용
function idiomParenChars(disp) {
  var set = {};
  var m = disp.match(/\(([^)]*)\)/g) || [];
  for (var i = 0; i < m.length; i++) {
    var inner = m[i].slice(1, -1);
    for (var j = 0; j < inner.length; j++) set[inner[j]] = 1;
  }
  return set;
}

// ---------- 덱 ----------
var DECKS = {
  hanja:  { data: HANJA,  key: function (r) { return r[0]; } },
  words:  { data: WORDS,  key: function (r) { return "w|" + r[0]; } },
  idioms: { data: IDIOMS, key: function (r) { return "i|" + r[0]; } }
};

// 표준형(이체자 쌍 중 정자) 단어 — 밑줄로만 표시 (형광펜/암기함과 구분)
var STD_FORM = { "w|抽籤":1, "w|膨脹":1, "w|詛呪":1, "w|妊娠":1, "w|生疏":1, "w|飢餓":1 };
function effMem(row) {
  var k = DECKS[tab].key(row);
  var o = memOver[k];
  if (typeof o === "boolean") return o;
  return tab === "hanja" ? row[3] >= 4 : false;
}
function effCat(row) { // 한자 전용
  var o = catOver[row[0]];
  if (o === 0 || o === 1 || o === 2) return o;
  return row[3] % 4;
}

function currentIndices() {
  var deck = DECKS[tab];
  var src = orders[tab] || deck.data.map(function (_, i) { return i; });
  var out = [];
  for (var k = 0; k < src.length; k++) {
    var row = deck.data[src[k]];
    if (filter === "todo" && effMem(row)) continue;
    if (filter === "done" && !effMem(row)) continue;
    if (filter === "star" && !starred.has(deck.key(row))) continue;
    out.push(src[k]);
  }
  return out;
}

function shuffleDeck() {
  var n = DECKS[tab].data.length;
  var a = [];
  for (var i = 0; i < n; i++) a.push(i);
  for (var j = a.length - 1; j > 0; j--) {
    var r = Math.floor(Math.random() * (j + 1));
    var t = a[j]; a[j] = a[r]; a[r] = t;
  }
  return a;
}

var $ = function (id) { return document.getElementById(id); };
function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

// ---------- 렌더 ----------
function hunGridHtml(disp) {
  var paren = idiomParenChars(disp);
  var chars = stripParens(disp);
  var html = '<div class="hungrid">';
  var hasBlank = false;
  for (var i = 0; i < chars.length; i++) {
    var ch = chars[i];
    var isBlank = paren[ch];
    if (isBlank) hasBlank = true;
    html += '<div class="huncell' + (isBlank ? ' blank' : '') + '">' +
            '<span class="hc">' + esc(ch) + '</span>' +
            '<span class="hh">' + esc(HUN[ch] || '') + '</span></div>';
  }
  html += '</div>';
  if (hasBlank) html += '<p class="blanknote">연한 칸 = 빈칸으로 출제된 적 있는 글자</p>';
  return html;
}

function readSecHtml(chsWithReads) {
  var html = '<div class="relsec"><span class="tag read">발음 주의</span>';
  for (var i = 0; i < chsWithReads.length; i++) {
    var ch = chsWithReads[i];
    var blocks = charReads[ch];
    for (var j = 0; j < blocks.length; j++) {
      html += '<span class="rb-hun">' + esc(ch) + ' · ' + esc(blocks[j][0]) + '</span>' +
              '<p class="rb-words">' + esc(blocks[j][1]) + '</p>';
    }
  }
  html += '</div>';
  return html;
}

function renderFront(row) {
  if (tab === "hanja") {
    var mem = effMem(row);
    var cat = effCat(row);
    return '<span class="glyph char' + (mem ? ' hl' : '') + (cat === 1 ? ' gr' : cat === 2 ? ' bl' : '') + '">' + esc(row[0]) + '</span>';
  }
  var cls = tab === "words" ? "word" : "idiom";
  return '<span class="glyph ' + cls + (effMem(row) ? ' hl' : '') + (STD_FORM[DECKS[tab].key(row)] ? ' std' : '') + '">' + esc(row[0]) + '</span>';
}

function renderAnswer(row) {
  if (tab === "hanja") {
    var html = '<p class="reading">' + esc(row[1]) + '</p>' +
               '<p class="freq">총 ' + row[2] + '회 등장</p>';
    if (charReads[row[0]]) html += readSecHtml([row[0]]);
    return html;
  }
  if (tab === "words") {
    var w = row[0];
    var html = '<p class="reading">' + esc(row[1]) + '</p>' +
               '<p class="meaning">' + esc(row[2]) + '</p>' +
               '<p class="freq">총 ' + row[3] + '회 등장</p>';
    // 관계 표기 (중요!)
    if (wordAnts[w]) {
      var an = wordAnts[w];
      html += '<div class="relsec"><span class="tag ant">반의어 · 상대어</span>' +
              '<div class="antrow">' +
              '<span><span class="antword">' + esc(w) + '</span><span class="antread">' + esc(row[1]) + '</span></span>' +
              '<span class="arrow">↔</span>' +
              '<span><span class="antword">' + esc(an[0]) + '</span><span class="antread">' + esc(an[1]) + '</span></span>' +
              '</div></div>';
    }
    if (wordForms[w]) {
      var fm = wordForms[w];
      html += '<div class="relsec"><span class="tag form">' + esc(fm[0]) + '</span>' +
              '<p class="meaning">' + esc(fm[1]) + '</p></div>';
    }
    var rc = [];
    for (var i = 0; i < w.length; i++) if (charReads[w[i]] && rc.indexOf(w[i]) < 0) rc.push(w[i]);
    if (rc.length) html += readSecHtml(rc);
    return html;
  }
  // 사자성어: 독음 + 글자별 훈음 + 뜻
  var chars = stripParens(row[0]);
  var html = '<p class="reading">' + esc(row[1]) + '</p>' +
             hunGridHtml(row[0]) +
             '<p class="meaning">' + esc(row[2]) + '</p>';
  var rc = [];
  for (var i = 0; i < chars.length; i++) if (charReads[chars[i]] && rc.indexOf(chars[i]) < 0) rc.push(chars[i]);
  if (rc.length) html += readSecHtml(rc);
  return html;
}

function renderRelated(row) {
  if (tab !== "hanja") return "";
  var ch = row[0];
  var ws = charWords[ch] || [];
  var is = charIdioms[ch] || [];
  if (!ws.length && !is.length) return "";
  var html = '<h3>' + esc(ch) + ' 가 들어간 단어 · 사자성어</h3>';
  for (var i = 0; i < ws.length; i++) {
    var w = WORDS[ws[i]];
    var marked = esc(w[0]).split(esc(ch)).join('<b>' + esc(ch) + '</b>');
    html += '<div class="relitem">' +
            '<span class="relword">' + marked + '</span>' +
            '<span class="relread">' + esc(w[1]) + '</span>' +
            '<p class="relmean">' + esc(w[2]) + '</p></div>';
  }
  for (var j = 0; j < is.length; j++) {
    var idm = IDIOMS[is[j]];
    var disp = esc(idm[0]).split(esc(ch)).join('<b>' + esc(ch) + '</b>');
    html += '<div class="relitem">' +
            '<span class="relword">' + disp + '</span>' +
            '<span class="relread">' + esc(idm[1]) + '</span>' +
            hunGridHtml(idm[0]) +
            '<p class="relmean">' + esc(idm[2]) + '</p></div>';
  }
  return html;
}

function render() {
  document.body.dataset.tab = tab;
  $("sub").textContent = "한자 " + HANJA.length.toLocaleString() + " · 단어 " + WORDS.length.toLocaleString() +
    " · 사자성어 " + IDIOMS.length + (starred.size > 0 ? " · 별표 " + starred.size : "");

  var idx = currentIndices();
  var total = idx.length;
  var hasCard = total > 0;

  $("card").style.display = hasCard ? "flex" : "none";
  $("answer").style.display = hasCard ? "" : "none";
  $("empty").style.display = hasCard ? "none" : "block";

  if (!hasCard) {
    $("empty").textContent = filter === "star"
      ? "별표한 카드가 아직 없음. 카드 오른쪽 위 ☆ 버튼으로 모을 수 있음."
      : filter === "done"
      ? "아직 형광펜(암기함)을 칠한 카드가 없음. 우측 상단 '암기함'을 더블클릭하면 칠할 수 있음."
      : "이 조건에 해당하는 카드가 없음.";
    return;
  }

  var pos = positions[tab] || 0;
  if (pos > total - 1) pos = total - 1;
  positions[tab] = pos;
  var row = DECKS[tab].data[idx[pos]];

  $("front").innerHTML = renderFront(row);
  $("ansbox").innerHTML = renderAnswer(row);
  var rel = renderRelated(row);
  $("relbox").style.display = rel ? "flex" : "none";
  $("relbox").innerHTML = rel;

  var isStar = starred.has(DECKS[tab].key(row));
  var st = $("star");
  st.textContent = isStar ? "★" : "☆";
  st.className = "star" + (isStar ? " on" : "");
  st.setAttribute("aria-pressed", isStar);

  $("answer").className = "answer" + (open ? " open" : "");
  $("answer").setAttribute("aria-hidden", !open);
  $("card").setAttribute("aria-expanded", open);

  $("posNow").textContent = pos + 1;
  $("posTotal").textContent = total.toLocaleString();
}

function go(d) {
  var total = currentIndices().length;
  if (!total) return;
  open = false;
  positions[tab] = ((positions[tab] || 0) + d + total) % total;
  render();
}

function currentRow() {
  var idx = currentIndices();
  if (!idx.length) return null;
  return DECKS[tab].data[idx[Math.min(positions[tab] || 0, idx.length - 1)]];
}

function toggleStar() {
  var row = currentRow();
  if (!row) return;
  var k = DECKS[tab].key(row);
  if (starred.has(k)) starred.delete(k);
  else starred.add(k);
  saveStars();
  render();
}

function pulse(btn) {
  btn.classList.remove("pulse");
  void btn.offsetWidth;
  btn.classList.add("pulse");
}

function setMemorized() {
  var row = currentRow();
  if (!row) return;
  var k = DECKS[tab].key(row);
  var base = tab === "hanja" ? row[3] >= 4 : false;
  var next = !effMem(row);
  if (next === base) delete memOver[k];
  else memOver[k] = next;
  saveMems();
  pulse($("legendYl"));
  render();
}

function setCategory(target) { // 한자 탭 전용
  if (tab !== "hanja") return;
  var row = currentRow();
  if (!row) return;
  var h = row[0];
  var base = row[3] % 4;
  var now = effCat(row);
  if (now === target) {
    if (base === target) catOver[h] = 0; else delete catOver[h];
  } else {
    if (base === target) delete catOver[h]; else catOver[h] = target;
  }
  saveCats();
  pulse(target === 1 ? $("legendGr") : $("legendBl"));
  render();
}

function bindDouble(el, fn) {
  var fired = 0;
  function run() {
    var t = Date.now();
    if (t - fired < 400) return;
    fired = t;
    fn();
  }
  el.addEventListener("dblclick", function (e) { e.preventDefault(); run(); });
  var last = 0;
  el.addEventListener("touchend", function (e) {
    var now = Date.now();
    if (now - last < 320) { e.preventDefault(); run(); }
    last = now;
  });
}
bindDouble($("legendYl"), setMemorized);
bindDouble($("legendGr"), function () { setCategory(1); });
bindDouble($("legendBl"), function () { setCategory(2); });

// 탭 · 필터 · 순서
document.querySelectorAll("#tabs .tab").forEach(function (b) {
  b.addEventListener("click", function () {
    tab = b.dataset.t; open = false;
    document.querySelectorAll("#tabs .tab").forEach(function (x) { x.classList.toggle("on", x === b); });
    document.querySelectorAll("#filters .chip").forEach(function (x) { x.classList.toggle("on", x.dataset.f === filter); });
    document.getElementById(orders[tab] ? "btnShuf" : "btnOrig").classList.add("on");
    document.getElementById(orders[tab] ? "btnOrig" : "btnShuf").classList.remove("on");
    render();
  });
});
document.querySelectorAll("#filters .chip").forEach(function (b) {
  b.addEventListener("click", function () {
    filter = b.dataset.f; positions[tab] = 0; open = false;
    document.querySelectorAll("#filters .chip").forEach(function (x) { x.classList.toggle("on", x === b); });
    render();
  });
});
$("btnOrig").addEventListener("click", function () {
  orders[tab] = null; positions[tab] = 0; open = false;
  $("btnOrig").classList.add("on"); $("btnShuf").classList.remove("on");
  render();
});
$("btnShuf").addEventListener("click", function () {
  orders[tab] = shuffleDeck(); positions[tab] = 0; open = false;
  $("btnShuf").classList.add("on"); $("btnOrig").classList.remove("on");
  render();
});

// 카드를 끌어서 넘기기 (카드 위에서만 작동 — 빈 화면 스와이프는 아무 일 없음)
var suppressClick = false;
(function () {
  var card = $("card");
  var RM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var dragging = false, horiz = null, startX = 0, startY = 0, dx = 0;

  function settle() {
    card.style.transition = RM ? "none" : "transform .25s ease";
    card.style.transform = "translateX(0) rotate(0deg)";
  }
  card.addEventListener("pointerdown", function (e) {
    if (e.button !== undefined && e.button !== 0) return;
    dragging = true; horiz = null; dx = 0;
    startX = e.clientX; startY = e.clientY;
    try { card.setPointerCapture(e.pointerId); } catch (err) {}
    card.style.transition = "none";
  });
  card.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    var mx = e.clientX - startX;
    var my = e.clientY - startY;
    if (horiz === null && (Math.abs(mx) > 8 || Math.abs(my) > 8)) horiz = Math.abs(mx) > Math.abs(my);
    if (horiz) {
      dx = mx;
      card.style.transform = "translateX(" + dx + "px) rotate(" + dx * 0.02 + "deg)";
    }
  });
  function finish() {
    if (!dragging) return;
    dragging = false;
    var w = card.offsetWidth || 460;
    var threshold = Math.max(90, w * 0.3);
    if (horiz && Math.abs(dx) > threshold) {
      suppressClick = true;
      var dir = dx < 0 ? 1 : -1;
      if (RM) {
        card.style.transition = "none";
        card.style.transform = "translateX(0) rotate(0deg)";
        go(dir);
      } else {
        var out = dir === 1 ? -(w + 100) : (w + 100);
        card.style.transition = "transform .18s ease";
        card.style.transform = "translateX(" + out + "px) rotate(" + dx * 0.03 + "deg)";
        setTimeout(function () {
          go(dir);
          card.style.transition = "none";
          card.style.transform = "translateX(" + (dir === 1 ? (w + 100) : -(w + 100)) + "px)";
          void card.offsetWidth;
          settle();
        }, 180);
      }
    } else {
      if (horiz && Math.abs(dx) > 8) suppressClick = true;
      settle();
    }
    setTimeout(function () { suppressClick = false; }, 120);
  }
  card.addEventListener("pointerup", finish);
  card.addEventListener("pointercancel", function () { dragging = false; settle(); });
})();

$("card").addEventListener("click", function () {
  if (suppressClick) return;
  open = !open; render();
});
$("card").addEventListener("keydown", function (e) {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault(); e.stopPropagation();
    open = !open; render();
  }
});
$("star").addEventListener("click", function (e) { e.stopPropagation(); toggleStar(); });

window.addEventListener("keydown", function (e) {
  if (e.target !== document.body && e.target !== $("card")) return;
  if (e.key === "ArrowRight") go(1);
  else if (e.key === "ArrowLeft") go(-1);
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); open = !open; render(); }
  else if (e.key === "s" || e.key === "S") toggleStar();
});

// 첫 방문 안내 (한 번만)
(function () {
  var seen = false;
  try { seen = !!localStorage.getItem(INTRO_KEY); } catch (e) {}
  if (seen) return;
  var t = $("toast");
  t.style.display = "block";
  function dismiss() {
    t.style.display = "none";
    try { localStorage.setItem(INTRO_KEY, "1"); } catch (e) {}
  }
  t.addEventListener("click", dismiss);
  setTimeout(dismiss, 7000);
})();

render();
</script>
</body>
</html>
